short_bio: >-
  <p>
    I am a PhD Student in Earth and Space Sciences at York University. I completed my Bachelors in Space Engineering, graduating first class with distinctions. Space Engineering is a branch of systems engineering focused on the Space Sector.
  </p>
  
  <p>
    My Research focuses on Space Situational Awareness (SSA), which is a field of study which includes detection, identification, and tracking of various space objects. My current work focuses on Very-Short Arc Initial Orbit Determination, a major problem for tracking space objects from space-based sensors.
  </p>
  
  <p>
    Outside of research I love to travel, be outdoors, and eat good food. If you are interested in my work or just chatting, feel free to send me an email or a message on LinkedIn.
  </p>

